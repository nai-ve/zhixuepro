<!DOCTYPE html>
<html lang="en">
<head>

<body>

      <li><p>未完成</p><div class="underline"></div><P>
      <li><p>已完成</p><div class="underline"></div><p>

  </div>
    <!--右-->
<div style="width:100%; height: 40px; background-color: white; text-align: right;">

	<div class="arrow" id="arrow"><img src="/img/13.png" width="25px" height="25px" top: 35px;></div>
	<div class="block" id="block">

</div>
  <!--主要内容-->
  <div class="connect">
      <img class="nothing" src="img/16.jpg">

  </div>
    <!--导航栏-->
    <div class="navbar">
        <div style="width:100%; display: flex; justify-content: space-around;align-items: center;">
    		<a href="home.html">
    			    <img src="img/12.jpg" alt="首页">

</body>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const defaultItem = document.querySelector('.nav li:first-child');
      const defaultUnderline = defaultItem.querySelector('.underline');
      defaultUnderline.style.display = 'block';
    });

    const navItems = document.querySelectorAll('.nav li');
    const underlines = document.querySelectorAll('.underline');

    navItems.forEach((item, index) => {
      item.addEventListener('click', function() {
        underlines.forEach(underline => {
          underline.style.display = 'none';
        });
        underlines[index].style.display = 'block';
      });
    });
    //右边
    	// script.js
	const arrow = document.getElementById('arrow');
	const block = document.getElementById('block');
	
	arrow.addEventListener('click', function() {
	  if (arrow.innerHTML ===  '<img src="/img/13.png" alt="/img/13.png" width="25px" height="25px">') {
	    arrow.innerHTML = '<img src="/img/15.jpg" width="25px" height="25px"/>';
	    block.style.display = 'block';
	  } else {
	    arrow.innerHTML ='<img src="/img/13.png"  alt="/img/13.png" width="25px" height="25px">';
	    block.style.display = 'none';
	  }
	});

  </script>
</html>
