<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>折线图</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }
    .chart {
        width: 400px;
        height: 160px;
        border: 1px solid #ccc;
        position: relative;
    }
    .x-axis {
        position: absolute;
        left: 0;
        bottom: -20px;
        width: 100%;
        display: flex;
        justify-content: space-between;
    }
    .y-axis {
        position: absolute;
        left: -40px;
        top: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .line {
        fill: none;
        stroke: blue;
        stroke-width: 2;
    }
    .point {
        fill: blue;
    }
    .divider {
        stroke: #ccc;
        stroke-dasharray: 1;
    }
</style>
</head>
<body>
<div class="chart">
    <svg width="400" height="160">
        <g class="x-axis">
            <text x="50" y="160">07.11</text>
            <text x="150" y="160">08.28</text>
            <text x="250" y="160">11.28</text>
            <text x="350" y="160">01.09</text>
            <text x="450" y="160">03.05</text>
        </g>
        <g class="y-axis">
            <text x="20" y="30">E</text>
            <line x1="30" y1="10" x2="470" y2="10" class="divider" />
            <text x="20" y="60">D</text>
            <line x1="30" y1="200" x2="470" y2="200" class="divider" />
            <text x="20" y="90">C</text>
            <line x1="30" y1="300" x2="470" y2="300" class="divider" />
            <text x="20" y="120">B</text>
            <line x1="30" y1="400" x2="470" y2="400" class="divider" />
            <text x="20" y="150">A</text>
        </g>
        <polyline class="line" points="50,350 150,150 250,250 350,50 450,200" />
        <g class="points">
            <circle cx="50" cy="350" r="3" class="point" />
            <circle cx="150" cy="150" r="3" class="point" />
            <circle cx="250" cy="250" r="3" class="point" />
            <circle cx="350" cy="50" r="3" class="point" />
            <circle cx="450" cy="200" r="3" class="point" />
        </g>
        <line x1="50" y1="50" x2="50" y2="400" class="divider" />
        <line x1="150" y1="50" x2="150" y2="400" class="divider" />
        <line x1="250" y1="50" x2="250" y2="400" class="divider" />
        <line x1="350" y1="50" x2="350" y2="400" class="divider" />
        <line x1="450" y1="50" x2="450" y2="400" class="divider" />
    </svg>
</div>
</body>
</html>
